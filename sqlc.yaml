version: "2"
plugins:
  - name: wasm-sqlite
    wasm:
      # This will be the compiled WASM plugin
      url: file://./plugin/sqlc-wasm-sqlite.wasm
      sha256: "" # Will be updated after building
sql:
  - engine: sqlite
    schema: "schema.sql"
    queries: "queries.sql"
    codegen:
      - out: generated
        plugin: wasm-sqlite
        options:
          # Plugin-specific options
          package: "database"
          go_package: "github.com/example/project/database"
          js_module: "database.js"
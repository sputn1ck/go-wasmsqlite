name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      browser_tests:
        description: Run browser E2E tests
        required: false
        default: "false"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          
      - name: Get dependencies
        run: go mod download
          
      - name: Run tests
        run: go test -v ./...
          
      - name: Build Example
        run: make build-example
          
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
          
      - name: Run go vet
        run: GOOS=js GOARCH=wasm go vet ./...

  browser-test:
    runs-on: ubuntu-latest
    if: ${{ vars.WASM_BROWSER_TEST == '1' || github.event.inputs.browser_tests == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run browser E2E tests
        run: make browser-test

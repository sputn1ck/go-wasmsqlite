name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          
      - name: Get dependencies
        run: go mod download
          
      - name: Run tests
        run: go test -v ./...
          
      - name: Build Example
        run: make build-example
          
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
          
      - name: Run go vet
        run: GOOS=js GOARCH=wasm go vet ./...

  browser-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run browser E2E tests
        run: make browser-test

  playwright-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

  deploy-netlify:
    runs-on: ubuntu-latest
    needs: [ compile, browser-test, playwright-test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: netlify
      url: https://go-wasmsqlite-demo.netlify.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Example
        run: make build-example

      - name: Verify Netlify headers
        run: |
          test -f example/_headers
          grep -q "Cross-Origin-Opener-Policy: same-origin" example/_headers
          grep -q "Cross-Origin-Embedder-Policy: require-corp" example/_headers

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is required"
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID secret is required"
            exit 1
          fi

          npx --yes netlify-cli@26.0.2 deploy \
            --dir example \
            --prod \
            --no-build \
            --site "$NETLIFY_SITE_ID" \
            --message "GitHub Actions deploy ${GITHUB_SHA}"
